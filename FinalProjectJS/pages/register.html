<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../css/register.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <form class="register-box" id="registerForm">
        <h2>Sign Up</h2>
        <p id="successMsg" class="success"></p>

        <input type="email" id="email" placeholder="Email here..." />
        <span class="error" id="emailError"></span>

        <input type="password" id="password" placeholder="Password here..." />
        <span class="error" id="passwordError"></span>

        <input
          type="password"
          id="confirm"
          placeholder="Confirm password here..."
        />
        <span class="error" id="confirmError"></span>

        <button type="button" id="registerBtn">Sign up</button>

        <p class="login-link">
          You have account? <a href="login.html">Sign in</a>
        </p>
      </form>
    </div>    <script src="../js/register.js"></script>
  </body>
</html>
